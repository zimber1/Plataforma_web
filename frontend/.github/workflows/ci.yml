name: CI – Build, Accesibilidad y Rendimiento

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────
  # 1. Build del proyecto
  # ─────────────────────────────────────────
  build:
    name: Build del proyecto
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm install --no-audit --no-fund

      - name: Build de producción
        working-directory: ./frontend
        run: npm run build

      - name: Subir artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Verificación de accesibilidad (axe)
  # ─────────────────────────────────────────
  accessibility:
    name: Verificar accesibilidad
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar axe-cli y servidor estático
        run: npm install -g @axe-core/cli serve

      - name: Descargar artefacto del build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Ejecutar axe en las páginas principales
        run: |
          serve -s dist -l 4173 &
          sleep 3
          axe http://localhost:4173 --exit || true
          axe http://localhost:4173/login --exit || true
          axe http://localhost:4173/register --exit || true

  # ─────────────────────────────────────────
  # 3. Auditoría de rendimiento (Lighthouse)
  # ─────────────────────────────────────────
  performance:
    name: Auditoría de rendimiento con Lighthouse
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefacto del build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Ejecutar Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:4173/
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ─────────────────────────────────────────
  # 4. Verificar prefers-reduced-motion en CSS
  # ─────────────────────────────────────────
  reduced-motion-check:
    name: Verificar prefers-reduced-motion
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Buscar prefers-reduced-motion en CSS
        run: |
          echo "Buscando prefers-reduced-motion en archivos CSS..."
          if grep -r "prefers-reduced-motion" ./frontend/src; then
            echo "✅ prefers-reduced-motion encontrado en el CSS."
          else
            echo "⚠️  ADVERTENCIA: prefers-reduced-motion no encontrado en ningún archivo CSS."
            echo "Las animaciones no tienen fallback para usuarios con movimiento reducido activado."
            exit 1
          fi